name: Bug Report
description: Report a bug in SynchroIaC
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Scanner version
      placeholder: "e.g. v0.1.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      render: shell
